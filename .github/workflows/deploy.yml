name: Deploy to cPanel

# cPanel can't react to a GitHub push on its own, so this workflow is the
# automatic trigger: on every push to main it SSHes into the server, syncs the
# code, and runs the same deploy script cPanel's "Deploy HEAD" button uses.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never let two deploys run at once.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.CPANEL_APP_PATH }}"
            git fetch --all --prune
            git reset --hard origin/main
            export NODEVENV_ACTIVATE="${{ secrets.CPANEL_NODEVENV_ACTIVATE }}"
            bash deploy/cpanel-deploy.sh
